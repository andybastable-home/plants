<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2c6d4c" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f1a14" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Personal plant care tracker.">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="preload" href="./assets/fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="./styles.css">
  <title>Plants</title>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22c0-6-4-9-9-9 0 6 4 9 9 9z"/>
          <path d="M12 22c0-7 4-11 9-11 0 7-4 11-9 11z"/>
          <path d="M12 22V11"/>
        </svg>
      </span>
      <span class="brand-name">Plants</span>
      <span class="brand-version" aria-label="App version">v0.4.1</span>
    </div>
    <div class="header-actions">
      <button id="settings-btn" class="settings-btn" type="button" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <nav class="tab-strip" role="tablist" aria-label="Sections">
    <button class="tab-btn" role="tab" data-tab="today" aria-selected="true">Today</button>
    <button class="tab-btn" role="tab" data-tab="plants" aria-selected="false">Plants</button>
  </nav>

  <main class="app-main">
    <section class="tab-pane" data-pane="today">
      <!-- filled by app.js renderToday() -->
    </section>
    <section class="tab-pane" data-pane="plants" hidden>
      <!-- filled by app.js renderPlants() -->
    </section>

  </main>

  <footer class="app-footer">
    <span>v0.4.1 &middot; offline-ready</span>
  </footer>

  <!-- Plant modal overlay — content filled by app.js -->
  <div class="settings-overlay" id="plant-overlay" hidden>
    <div class="settings-panel" id="plant-overlay-panel" role="dialog" aria-modal="true" aria-label="Plant details">
      <!-- filled by app.js -->
    </div>
  </div>

  <script src="https://unpkg.com/dexie@4.4.2/dist/dexie.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
