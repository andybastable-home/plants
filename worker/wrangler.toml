name = "plants"
main = "index.js"
compatibility_date = "2024-11-01"
# web-push lib imports node:crypto — needs the Node compat shim on Workers.
compatibility_flags = ["nodejs_compat"]

# One frequent trigger drives scheduled(). It runs every 5 min all day; the handler
# reads Europe/London per-fire and acts only in the target hour (07 morning / 18 evening
# defer), made once-per-day by a KV dedupe guard. Why not the old twice-daily UTC crons?
# Cloudflare delays and sometimes drops an individual firing, and a single firing per
# target was silently missed (no morning push -> no defer offered -> no evening push) —
# the exact symptom seen. With */5 the target hour gets ~12 attempts, so a few delays no
# longer matter. DST-proof (hour computed in London) and it doubles as the cron health
# beacon + heartbeat test. ~288 firings/day, KV writes well under the free 1k/day cap;
# raise to */10 or */15 if you ever want it leaner. Old schedule, for reference/revert:
#   crons = ["30 6 * * *", "30 7 * * *", "0 17 * * *", "0 18 * * *"]
[triggers]
crons = ["*/5 * * * *"]

[[kv_namespaces]]
binding = "plants"
id = "02fd1fc3822f4abaa6be12fbbddc0ae7"

